<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Card | Nicholas George</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- QR Code Generator -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-text: #1a1a2e;
            --color-text-secondary: #4a4a5a;
            --color-text-tertiary: #7a7a8a;
            --color-bg: #f8f9fc;
            --color-border: #d0d4e0;
            --color-grid: #f0f1f5;
            --color-accent: #f7931a;
            --font-mono: 'IBM Plex Mono', 'SF Mono', 'Consolas', monospace;

            /* Standard business card: 3.5in x 2in */
            --card-w: 3.5in;
            --card-h: 2in;
            --chamfer: 8px;
        }

        body {
            font-family: var(--font-mono);
            background: #e8e8e8;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }

        h2.label {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #999;
        }

        /* ============ CARD BASE ============ */
        .card {
            width: var(--card-w);
            height: var(--card-h);
            background: var(--color-bg);
            background-image:
                linear-gradient(var(--color-grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--color-grid) 1px, transparent 1px);
            background-size: 20px 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            /* Chamfered corners */
            clip-path: polygon(
                var(--chamfer) 0,
                calc(100% - var(--chamfer)) 0,
                100% var(--chamfer),
                100% calc(100% - var(--chamfer)),
                calc(100% - var(--chamfer)) 100%,
                var(--chamfer) 100%,
                0 calc(100% - var(--chamfer)),
                0 var(--chamfer)
            );
        }

        /* Drawing border inset */
        .card::before {
            content: '';
            position: absolute;
            top: 6px;
            left: 6px;
            right: 6px;
            bottom: 6px;
            border: 0.5px solid var(--color-border);
            pointer-events: none;
            z-index: 2;
            /* Match chamfer on inner border */
            clip-path: polygon(
                6px 0,
                calc(100% - 6px) 0,
                100% 6px,
                100% calc(100% - 6px),
                calc(100% - 6px) 100%,
                6px 100%,
                0 calc(100% - 6px),
                0 6px
            );
        }

        /* Orange edge stripe */
        .card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: var(--color-accent);
            z-index: 4;
        }

        /* ============ CORNER MARKS (removed) ============ */

        /* ============ FRONT SIDE ============ */
        .card-front {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 32px;
        }

        .front-content {
            display: flex;
            align-items: center;
            gap: 24px;
            z-index: 1;
            width: 100%;
            justify-content: center;
        }

        .front-qr-side {
            flex-shrink: 0;
        }

        #qrcode {
            width: 96px;
            height: 96px;
        }

        #qrcode svg {
            width: 96px;
            height: 96px;
        }

        .front-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
        }

        .front-logo svg {
            width: 28px;
            height: 28px;
        }

        .front-url {
            font-size: 0.55rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--color-text);
        }

        .front-url-accent {
            width: 24px;
            height: 1px;
            background: var(--color-accent);
        }

        .front-scan-hint {
            font-size: 0.3rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--color-text-tertiary);
        }

        /* ============ BACK SIDE ============ */
        .card-back {
            display: flex;
            flex-direction: column;
            padding: 24px 28px 18px;
        }

        .back-name {
            font-size: 1.1rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--color-text);
            z-index: 1;
            margin-bottom: 8px;
        }

        .back-details {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
            z-index: 1;
        }

        .back-left {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .back-title {
            font-size: 0.45rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--color-accent);
        }

        .back-location {
            font-size: 0.42rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--color-text-tertiary);
        }

        .back-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .back-contact-item {
            font-size: 0.42rem;
            letter-spacing: 0.05em;
            color: var(--color-text-secondary);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .back-contact-item svg {
            width: 8px;
            height: 8px;
            stroke: var(--color-accent);
            stroke-width: 1.5;
            fill: none;
            flex-shrink: 0;
        }

        .back-contact-item .icon-linkedin path {
            stroke: var(--color-accent);
        }

        /* ============ COMPANY BAR ============ */
        .company-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            z-index: 1;
            margin-top: auto;
        }

        .company-bar .company-name {
            font-size: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--color-text-tertiary);
        }

        .company-bar .diamond {
            width: 6px;
            height: 6px;
            background: var(--color-accent);
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            flex-shrink: 0;
        }

        /* ============ CIRCUIT TRACE DECORATION ============ */
        .circuit-deco {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.25;
            z-index: 1;
        }

        .circuit-deco svg {
            overflow: visible;
        }

        .circuit-deco path {
            fill: none;
            stroke: var(--color-border);
            stroke-width: 0.75;
        }

        .circuit-deco .via {
            fill: var(--color-accent);
        }

        .circuit-deco .via-ring {
            fill: none;
            stroke: var(--color-accent);
            stroke-width: 0.5;
        }

        /* ============ (title block & NTS removed for cleaner back) ============ */

        /* ============ PRINT STYLES ============ */
        @media print {
            body {
                background: white;
                padding: 0;
                gap: 0.25in;
            }

            h2.label {
                display: none;
            }

            .card {
                box-shadow: none;
                page-break-inside: avoid;
            }

            /* Both cards on one page */
            @page {
                size: 4.5in 5in;
                margin: 0.5in;
            }
        }
    </style>
</head>
<body>

    <h2 class="label">Front</h2>

    <!-- ==================== FRONT ==================== -->
    <div class="card card-front">
        <div class="front-content">
            <!-- QR Code (left) -->
            <div class="front-qr-side">
                <div id="qrcode"></div>
            </div>

            <!-- Logo + URL (right) -->
            <div class="front-info">
                <div class="front-logo">
                    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <polygon points="14,4 34,4 44,14 44,34 34,44 14,44 4,34 4,14" stroke="#1a1a2e" stroke-width="1.5" fill="none"/>
                        <line x1="24" y1="4" x2="24" y2="16" stroke="#1a1a2e" stroke-width="1"/>
                        <line x1="24" y1="32" x2="24" y2="44" stroke="#1a1a2e" stroke-width="1"/>
                        <line x1="4" y1="24" x2="16" y2="24" stroke="#1a1a2e" stroke-width="1"/>
                        <line x1="32" y1="24" x2="44" y2="24" stroke="#1a1a2e" stroke-width="1"/>
                        <polygon points="24,18 30,24 24,30 18,24" fill="#f7931a"/>
                    </svg>
                </div>
                <div class="front-url-accent"></div>
                <span class="front-url">proofofnick.com</span>
                <span class="front-scan-hint">Scan to view portfolio</span>
            </div>
        </div>

        <!-- Circuit trace decoration -->
        <div class="circuit-deco">
            <svg width="120" height="16" viewBox="0 0 120 16">
                <path d="M0,8 L20,8 L20,3 L50,3 L50,8 L70,8 L70,13 L100,13 L100,8 L120,8"/>
                <circle class="via-ring" cx="50" cy="3" r="2"/>
                <circle class="via" cx="50" cy="3" r="1"/>
                <circle class="via-ring" cx="70" cy="8" r="2"/>
                <circle class="via" cx="70" cy="8" r="1"/>
            </svg>
        </div>
    </div>

    <h2 class="label">Back</h2>

    <!-- ==================== BACK ==================== -->
    <div class="card card-back">

        <!-- Name -->
        <span class="back-name">Nicholas George</span>

        <!-- Details row: subtitle left, contact right -->
        <div class="back-details">
            <div class="back-left">
                <span class="back-title">Mechanical Product</span>
                <span class="back-title">Design Engineer</span>
                <span class="back-location">Miami, FL</span>
            </div>

            <div class="back-right">
                <span class="back-contact-item">
                    <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                    207-570-0769
                </span>
                <span class="back-contact-item">
                    <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="22,6 12,13 2,6"/></svg>
                    hello@proofofnick.com
                </span>
                <span class="back-contact-item">
                    <svg viewBox="0 0 24 24"><path class="icon-linkedin" d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
                    linkedin.com/in/nickpgeorge
                </span>
            </div>
        </div>

        <!-- Company bar at bottom -->
        <div class="company-bar">
            <span class="company-name">Block</span>
            <span class="diamond"></span>
            <span class="company-name">Apple</span>
            <span class="diamond"></span>
            <span class="company-name">Magic Leap</span>
        </div>
    </div>

    <script>
        // Generate QR code
        var qr = qrcode(0, 'M');
        qr.addData('https://proofofnick.com');
        qr.make();

        var moduleCount = qr.getModuleCount();
        var cellSize = 3;
        var margin = 1;
        var size = moduleCount * cellSize + margin * 2;
        var radius = cellSize * 0.42; // dot radius
        var color = '#1a1a2e';

        var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' + size + ' ' + size + '">';

        for (var row = 0; row < moduleCount; row++) {
            for (var col = 0; col < moduleCount; col++) {
                if (qr.isDark(row, col)) {
                    var cx = margin + col * cellSize + cellSize / 2;
                    var cy = margin + row * cellSize + cellSize / 2;
                    svg += '<circle cx="' + cx + '" cy="' + cy + '" r="' + radius + '" fill="' + color + '"/>';
                }
            }
        }

        svg += '</svg>';
        document.getElementById('qrcode').innerHTML = svg;
    </script>

</body>
</html>
